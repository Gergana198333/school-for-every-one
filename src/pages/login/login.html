<section class="page-hero">
  <div class="container">
    <h1 class="display-6 fw-semibold">Вход и регистрация</h1>
    <p class="lead mb-0">За учители, ученици и родители. Посетителите могат да разглеждат сайта без вход.</p>
  </div>
</section>

<section class="container page-section">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <form class="bg-white p-4 rounded-3 shadow-sm" id="auth-form">
        <div class="mb-3">
          <label for="authFullName" class="form-label">Име и фамилия</label>
          <input id="authFullName" name="fullName" class="form-control" placeholder="Петя Петрова" />
        </div>

        <div class="mb-3">
          <label for="authRole" class="form-label">Роля</label>
          <select id="authRole" name="role" class="form-select">
            <option value="student">Ученик</option>
            <option value="teacher">Учител</option>
            <option value="parent">Родител</option>
          </select>
        </div>

        <div class="mb-3" id="auth-class-wrap">
          <label for="authClass" class="form-label">Клас</label>
          <select id="authClass" name="classId" class="form-select"></select>
        </div>

        <div class="mb-3" id="auth-code-wrap">
          <label for="authSchoolCode" class="form-label">Код от училището</label>
          <input
            id="authSchoolCode"
            name="schoolCode"
            type="text"
            class="form-control"
            placeholder="Пример: 5U00234 или 5RU00234"
            autocomplete="off"
          />
          <div class="form-text">За ученици и родители е задължителен код, издаден от училището.</div>
        </div>

        <div class="mb-3">
          <label for="authEmail" class="form-label">Имейл</label>
          <input id="authEmail" name="email" type="email" class="form-control" required />
        </div>

        <div class="mb-3">
          <label for="authPassword" class="form-label">Парола</label>
          <input id="authPassword" name="password" type="password" class="form-control" minlength="6" required />
        </div>

        <div class="d-flex flex-wrap gap-2">
          <button type="submit" class="btn btn-primary" data-auth-action="login">Вход</button>
          <button type="button" class="btn btn-outline-primary" id="signup-btn">Регистрация</button>
        </div>

        <p class="mt-3 mb-0 d-none" id="auth-message"></p>
      </form>
    </div>
  </div>
</section>
