<section class="page-hero">
  <div class="container">
    <h1 class="display-6 fw-semibold">Контакти</h1>
    <p class="lead mb-0">Изпратете въпрос към учител или предайте домашна работа.</p>
  </div>
</section>

<section class="container page-section">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <form class="bg-white p-4 rounded-3 shadow-sm" id="contact-form">
        <div class="mb-3">
          <label for="studentName" class="form-label"><i class="bi bi-person-fill me-2" aria-hidden="true"></i>Име на ученик</label>
          <input type="text" class="form-control" id="studentName" name="studentName" required />
        </div>
        <div class="mb-3">
          <label for="studentClass" class="form-label"><i class="bi bi-mortarboard-fill me-2" aria-hidden="true"></i>Клас</label>
          <input type="text" class="form-control" id="studentClass" name="studentClass" required />
        </div>
        <div class="mb-3">
          <label for="questionText" class="form-label"><i class="bi bi-chat-left-text-fill me-2" aria-hidden="true"></i>Въпрос / съобщение</label>
          <textarea class="form-control" id="questionText" name="questionText" rows="4" required></textarea>
        </div>
        <div class="mb-3">
          <label for="homeworkFile" class="form-label"><i class="bi bi-paperclip me-2" aria-hidden="true"></i>Домашна работа (файл)</label>
          <input class="form-control" type="file" id="homeworkFile" name="homeworkFile" />
        </div>
        <button type="submit" class="btn btn-primary"><i class="bi bi-send-fill me-2" aria-hidden="true"></i>Изпрати</button>
        <p class="mt-3 mb-0 text-success d-none" id="form-message">Формата е изпратена успешно.</p>
      </form>
    </div>
  </div>
</section>
